name: Football Tipper v10 PROFI

on:
  schedule:
    - cron: '0 6,16 * * *'
  workflow_dispatch:

jobs:
  run-profi-model:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          # OPRAVA: Povieme GitHubu, ktorý súbor má sledovať pre cache
          cache: 'pip'
          cache-dependency-path: 'requirements_v10.txt'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements_v10.txt ]; then
            pip install -r requirements_v10.txt
          else
            echo "CHYBA: requirements_v10.txt nenájdený!"
            exit 1
          fi

      - name: Create directories
        run: |
          mkdir -p cache
          mkdir -p exports
          echo "Priečinky pripravené."

      - name: Run Profi Model
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
          GMAIL_RECEIVER: ${{ secrets.GMAIL_RECEIVER }}
          AKTUALNY_BANK: ${{ secrets.AKTUALNY_BANK }}
        run: python main_v10_profi_betting.py

      - name: Commit and Push DB and Exports
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add bets.db exports/*.csv exports/*.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "Žiadne zmeny."
          else
            git commit -m "v10 PROFI: Automatická aktualizácia [skip ci]"
            git push
          fi
