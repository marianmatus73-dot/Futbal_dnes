name: Multisport Betting Engine

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6,16 * * *'

jobs:
  run:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

          if [ -f requirements_v10.txt ]; then
            pip install -r requirements_v10.txt
          elif [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            echo "requirements file missing"
            exit 1
          fi

      - name: Create directories
        run: |
          mkdir -p cache
          mkdir -p exports

      - name: Run engine
        env:
          # ===== API =====
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}

          # ===== EMAIL =====
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
          GMAIL_RECEIVER: ${{ secrets.GMAIL_RECEIVER }}

          # ===== BANK =====
          AKTUALNY_BANK: ${{ secrets.AKTUALNY_BANK }}

          # ===== SPORTS =====
          SPORT_MODE: all

          # ===== TENNIS =====
          TENNIS_SPORT_KEYS: tennis_atp,tennis_wta

          # ===== BASKETBALL =====
          BASKETBALL_SPORT_KEYS: basketball_nba

          # ===== HOCKEY =====
          HOCKEY_SPORT_KEYS: icehockey_iihf_world_championship,icehockey_nhl,icehockey_sweden_hockey_league,icehockey_finland_liiga,icehockey_germany_del,icehockey_czech_extraliga,icehockey_switzerland_national_league

          # ===== MARKET DEPTH =====
          MIN_TENNIS_BOOKMAKERS: 3
          MIN_BASKETBALL_BOOKMAKERS: 3
          MIN_HOCKEY_BOOKMAKERS: 3

          # ===== EDGE FILTERS =====
          MIN_EDGE: 0.08
          MAX_EDGE: 0.13
          MIN_PROB: 0.20
          MAX_ODDS: 4.50

          # ===== KELLY / RISK =====
          KELLY_FRAC: 0.0075
          MAX_STAKE_PCT: 0.005
          MIN_STAKE: 1

          TOP_N_REPORT: 2
          MAX_BETS_PER_DAY: 2

          MAX_DAILY_EXPOSURE_PCT: 0.03
          MAX_MATCH_EXPOSURE_PCT: 0.01
          MAX_LEAGUE_EXPOSURE_PCT: 0.025

          # ===== LONGSHOTS =====
          LONGSHOT_MAX_ODDS: 4.00
          LONGSHOT_MIN_EDGE: 0.14
          LONGSHOT_MIN_PROB: 0.24

          # ===== MARKET CONSENSUS =====
          REQUIRE_MARKET_AGREEMENT: 1
          MIN_BOOKMAKERS_AGREE: 2

          MARKET_BLEND_WEIGHT: 0.55
          MIN_MARKET_EDGE: 0.04
          PROB_SHRINK: 0.72

          # ===== AI =====
          AI_FILTER_ENABLED: 0

          # ===== CLV =====
          SNAPSHOT_ODDS: 1
          CLV_LOOKBACK_HOURS: 12
          CLV_MODEL_MIN_SAMPLES: 25

          # ===== ELO =====
          ELO_ENABLED: 1
          ELO_BASE: 1500
          ELO_K: 22
          ELO_HOME_ADV: 65

          # ===== META =====
          META_LAYER_ENABLED: 1
          META_MIN_CONFIDENCE: 0.60
          META_REDUCE_BELOW: 0.72

          # ===== LIVE =====
          LIVE_MODE_ENABLED: 0

          # ===== NEWS / INJURY =====
          INJURY_NEWS_ENABLED: 0

          # ===== PERFORMANCE =====
          CACHE_TTL_SECONDS: 3600
          HTTP_TIMEOUT: 30
          LOOKAHEAD_HOURS: 72

          # ===== TIMEZONE =====
          LOCAL_TZ: Europe/Bratislava

          # ===== LOGGING =====
          LOG_LEVEL: INFO

        run: |
          python main.py --sport all

      - name: Commit exports
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add bets.db exports/*.csv exports/*.json 2>/dev/null || true

          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "Multisport update [skip ci]"
            git push
          fi
