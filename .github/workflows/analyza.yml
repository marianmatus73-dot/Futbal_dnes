name: Football Tipper v10 PROFI

on:
  schedule:
    - cron: '0 6,16 * * *' # Spúšťa sa 08:00 a 18:00 nášho času
  workflow_dispatch:

jobs:
  run-betting-model:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Dôležité pre ukladanie bets.db
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_v10.txt

      - name: Run Model
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
          AKTUALNY_BANK: ${{ secrets.AKTUALNY_BANK }}
          # Ostatné nastavenia si skript vytiahne z tvojho .env súboru v repozitári
        run: python main_v10_profi_betting.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add bets.db exports/
          git commit -m "v10: Update DB and exports [skip ci]" || exit 0
          git push
