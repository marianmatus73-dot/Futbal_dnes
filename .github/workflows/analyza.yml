name: Multisport Betting Engine

on:
  schedule:
    - cron: '0 6,16 * * *'
  workflow_dispatch:

jobs:
  run-multisport-model:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

          if [ -f requirements_v10.txt ]; then
            pip install -r requirements_v10.txt
          elif [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            echo "requirements file missing"
            exit 1
          fi

      - name: Create directories
        run: |
          mkdir -p cache
          mkdir -p exports

      - name: Fix Python file names
        run: |
          find . -name "*.py.txt" -exec sh -c 'mv "$1" "${1%.txt}"' _ {} \;

          touch core/__init__.py
          touch sports/__init__.py

          if [ ! -f sports/base.py ]; then
            cat > sports/base.py <<'EOF'
from __future__ import annotations

from abc import ABC, abstractmethod

from core.config import Settings
from core.types import SportResult


class SportModule(ABC):
    name: str

    @abstractmethod
    async def scan(self, settings: Settings) -> SportResult:
        pass

    async def backtest(self, settings: Settings, days: int = 180) -> SportResult:
        return SportResult(self.name, "backtest", [], "Backtest not implemented yet.")

    async def analytics(self, settings: Settings) -> SportResult:
        return SportResult(self.name, "analytics", [], "Analytics not implemented yet.")
EOF
          fi

      - name: Debug structure
        run: |
          echo "ROOT:"
          ls -la

          echo "CORE:"
          ls -la core || true

          echo "SPORTS:"
          ls -la sports || true

      - name: Run multisport engine
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}

          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
          GMAIL_RECEIVER: ${{ secrets.GMAIL_RECEIVER }}

          AKTUALNY_BANK: ${{ secrets.AKTUALNY_BANK }}

          SPORT_MODE: all

          TENNIS_SPORT_KEYS: tennis_atp
          BASKETBALL_SPORT_KEYS: basketball_nba
          HOCKEY_SPORT_KEYS: icehockey_nhl

          MIN_EDGE: 0.08
          MAX_EDGE: 0.15
          MAX_ODDS: 7.5

          KELLY_FRAC: 0.015
          MAX_STAKE_PCT: 0.01

        run: |
          python main.py --sport all

      - name: Commit and Push DB and Exports
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add bets.db exports/*.csv exports/*.json 2>/dev/null || true

          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "Multisport update [skip ci]"
            git push
          fi
