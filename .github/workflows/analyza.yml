name: Futbal Tipper Auto Run

on:
  schedule:
    # Čas je v UTC (Slovensko je +2 hodiny v lete)
    # Tento príklad spúšťa skript každý deň o 08:00 a 18:00 nášho času
    - cron: '0 6,16 * * *'
  workflow_dispatch: # Toto políčko ti dovolí spustiť skript aj ručne kedykoľvek

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install aiohttp pandas numpy scipy lightgbm scikit-learn python-dotenv

      - name: Run script
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
          AKTUALNY_BANK: ${{ secrets.AKTUALNY_BANK }}
        run: python main.py

      - name: Commit and Push DB changes
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add bets.db
          git commit -m "Update DB: Results and New Bets" || exit 0
          git push
