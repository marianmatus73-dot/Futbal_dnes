name: Multisport Betting Engine

on:
  schedule:
    - cron: '0 6,16 * * *'
  workflow_dispatch:

jobs:
  run-multisport-model:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: 'requirements_v10.txt'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements_v10.txt ]; then
            pip install -r requirements_v10.txt
          elif [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            echo "CHYBA: requirements súbor nenájdený!"
            exit 1
          fi

      - name: Create directories
        run: |
          mkdir -p cache
          mkdir -p exports
          echo "Priečinky pripravené."

      - name: Run Multisport Engine
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
          GMAIL_RECEIVER: ${{ secrets.GMAIL_RECEIVER }}
          AKTUALNY_BANK: ${{ secrets.AKTUALNY_BANK }}
          SPORT_MODE: all
          MIN_EDGE: 0.08
          MAX_EDGE: 0.15
          MAX_ODDS: 7.5
          KELLY_FRAC: 0.015
          MAX_STAKE_PCT: 0.01
        run: python main.py --sport all

      - name: Commit and Push DB and Exports
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add bets.db exports/*.csv exports/*.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "Žiadne zmeny."
          else
            git commit -m "Multisport: Automatická aktualizácia [skip ci]"
            git push
          fi
