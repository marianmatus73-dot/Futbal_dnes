name: Football Tipper v10 PROFI

on:
  schedule:
    # Spúšťa sa 2x denne: 08:00 a 18:00 nášho času (v lete)
    - cron: '0 6,16 * * *'
  workflow_dispatch: # Umožňuje spustiť skript ručne tlačidlom

jobs:
  run-profi-model:
    runs-on: ubuntu-latest
    
    # Dôležité pre ukladanie zmien v databáze (v10 potrebuje zápis)
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip' # Urýchli inštaláciu pri ďalšom spustení

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements_v10.txt ]; then
            pip install -r requirements_v10.txt
          else
            echo "Súbor requirements_v10.txt nebol nájdený!"
            exit 1
          fi

      - name: Create directories
        run: |
          mkdir -p cache
          mkdir -p exports
          logging_dir=$(grep "LOG_LEVEL" .env | cut -d '=' -f2 || echo "INFO")
          echo "Priečinky pripravené."

      - name: Run Profi Model
        env:
          # Tajné kľúče ťaháme z GitHub Secrets
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
          GMAIL_RECEIVER: ${{ secrets.GMAIL_RECEIVER }}
          AKTUALNY_BANK: ${{ secrets.AKTUALNY_BANK }}
        # Spúšťame presný názov tvojho v10 súboru
        run: python main_v10_profi_betting.py

      - name: Commit and Push DB and Exports
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Pridáme databázu, exporty a vynecháme cache (tá je dočasná)
          git add bets.db exports/*.csv exports/*.json 2>/dev/null || true
          
          # Commitne zmeny len ak nejaké nastali
          if git diff --staged --quiet; then
            echo "Žiadne zmeny na uloženie."
          else
            git commit -m "v10 PROFI: Automatická aktualizácia dát [skip ci]"
            git push
          fi
