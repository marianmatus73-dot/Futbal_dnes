name: Multisport Betting Engine

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6,16 * * *'

jobs:
  run:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4  # Aktualizované na v4

      - name: Setup Python
        uses: actions/setup-python@v5 # Aktualizované na v5
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: 'requirements_v10.txt'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

          if [ -f requirements_v10.txt ]; then
            pip install -r requirements_v10.txt
          elif [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            echo "requirements file missing"
            exit 1
          fi

      - name: Create directories
        run: |
          mkdir -p cache
          mkdir -p exports

      - name: Run engine
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
          GMAIL_RECEIVER: ${{ secrets.GMAIL_RECEIVER }}
          AKTUALNY_BANK: ${{ secrets.AKTUALNY_BANK }}

          SPORT_MODE: all

          TENNIS_SPORT_KEYS: tennis_atp_french_open,tennis_wta_french_open,tennis_atp_wimbledon,tennis_wta_wimbledon,tennis_atp_us_open,tennis_wta_us_open
          BASKETBALL_SPORT_KEYS: basketball_nba
          HOCKEY_SPORT_KEYS: icehockey_nhl

          MIN_EDGE: 0.08
          MAX_EDGE: 0.15
          MAX_ODDS: 7.5
          KELLY_FRAC: 0.015
          MAX_STAKE_PCT: 0.01

        run: |
          # Používame tvoj názov súboru main.py
          python main.py --sport all

      - name: Commit exports
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add bets.db exports/*.csv exports/*.json 2>/dev/null || true

          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "Multisport update [skip ci]"
            git push
          fi
