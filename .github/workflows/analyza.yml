name: AI Betting Bot Run

on:
  schedule:
    # Automatický beh 1x denne o 09:00 UTC (cca 10:00/11:00 nášho času)
    - cron: '0 9 * * *'
  workflow_dispatch: # Umožňuje manuálne spustenie tlačidlom v záložke Actions

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install aiohttp pandas numpy scipy python-dotenv fuzzywuzzy python-Levenshtein xgboost joblib scikit-learn

      - name: Run AI Analysis
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
          GMAIL_RECEIVER: ${{ secrets.GMAIL_RECEIVER }}
          AKTUALNY_BANK: 100
        run: |
          # Spustenie hlavného skriptu
          python main.py

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          # Pridáme históriu aj natrénovaný model spät do repozitára
          git add historia_tipov.csv ai_model.pkl || true
          git commit -m "Update history and AI model [skip ci]" || true
          git push
