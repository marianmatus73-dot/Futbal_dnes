name: V16.03 CLV Integrated Main Test

on:
  workflow_dispatch:

jobs:
  main-test:
    name: Run V16.03 CLV Integrated Main
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run integrated test
        run: |
          python main_v16_03_clv_integrated.py --sport all
