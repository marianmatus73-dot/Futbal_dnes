name: Cleanup betting history

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Verify cleanup script
        run: |
          test -f core/cleanup_history.py
          python -m py_compile core/cleanup_history.py

      - name: Run history cleanup
        env:
          DB_FILE: bets.db
        run: |
          python -m core.cleanup_history

      - name: Show cleanup result
        if: always()
        run: |
          echo "Changed files:"
          git status --short

          echo ""
          echo "History file:"
          ls -la exports/history_sport_bets.csv || true

          echo ""
          echo "Backups:"
          find backups -maxdepth 3 -type f -print || true

      - name: Upload cleanup backup
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: history-cleanup-backup
          path: backups/history_cleanup_*/
          if-no-files-found: warn
          retention-days: 30

      - name: Commit cleaned history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [ -f exports/history_sport_bets.csv ]; then
            git add exports/history_sport_bets.csv
          fi

          if [ -f bets.db ]; then
            git add bets.db
          fi

          if git ls-files --error-unmatch models/meta_model.pkl >/dev/null 2>&1; then
            git add -u models/meta_model.pkl
          fi

          if git diff --cached --quiet; then
            echo "No persistent cleanup changes to commit."
          else
            git commit -m "Clean duplicate betting history"
            git push
          fi
