name: V16.01.6 Football Snapshot Collector Test

on:
  workflow_dispatch:

jobs:
  collector-test:
    name: Run Football Snapshot Collector Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run collector test
        run: |
          python football_snapshot_collector_v16_01_6.py
