name: V16.02 CLV Integration Layer Test

on:
  workflow_dispatch:

jobs:
  integration-test:
    name: Run CLV Integration Layer Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run integration test
        run: |
          python clv_integration_layer_v16_02.py
