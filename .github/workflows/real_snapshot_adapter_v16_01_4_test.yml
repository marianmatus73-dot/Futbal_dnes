name: V16.01.4 Real Snapshot Adapter Test

on:
  workflow_dispatch:

jobs:
  adapter-test:
    name: Run Real Snapshot Adapter Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run adapter test
        run: |
          python real_snapshot_adapter_v16_01_4.py
