name: V16.02.1 Main Bridge Test

on:
  workflow_dispatch:

jobs:
  main-bridge-test:
    name: Run Main Bridge Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run main bridge test
        run: |
          python main_bridge_v16_02_1.py
